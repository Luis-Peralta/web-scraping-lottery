version: "3.8"
services:
  mongo:
    image: mongo:8.0-noble
    container_name: mongo_local
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - ./mongo_data:/data/db

volumes:
  mongo_data:
